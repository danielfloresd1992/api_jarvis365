  <style>*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}body{min-height:100vh;overflow-x:hidden;font-family:'Comic Sans MS','Chalkboard SE',cursive;background:#ffb3d9;display:flex;flex-direction:column;align-items:center;justify-content:center}#bg{position:fixed;inset:0;background:linear-gradient(135deg,#ff9ecd,#ffc2e0,#ffd6eb,#ffaad4,#ff80bf,#e8b4ff,#ffc8f0);background-size:500% 500%;animation:gradShift 8s ease infinite;z-index:0}@keyframes gradShift{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}#canvas{position:fixed;inset:0;pointer-events:none;z-index:1}main{position:relative;z-index:2;display:flex;flex-direction:column;align-items:center;gap:36px;padding:40px 20px 60px}.title-wrapper{background:rgba(255,255,255,.4);border:3px solid #ff69b4;border-radius:28px;padding:20px 36px;box-shadow:0 0 20px rgba(255,105,180,.4),inset 0 0 20px rgba(255,255,255,.3),0 0 60px rgba(255,20,147,.15);backdrop-filter:blur(6px)}h1{font-size:clamp(1.4rem,4.5vw,3.2rem);text-align:center;color:#ff1493;letter-spacing:2px;line-height:1.5;text-shadow:0 0 8px #fff,0 0 18px #ff69b4,0 0 35px #ff1493,3px 3px 0 #ffe0f0,-2px -2px 0 #ffb6c1;animation:titleFloat 3s ease-in-out infinite,shimmer 4s linear infinite}@keyframes titleFloat{0%,100%{transform:translateY(0px) rotate(-1deg)}50%{transform:translateY(-12px) rotate(1deg)}}@keyframes shimmer{0%{filter:hue-rotate(0deg) brightness(1)}50%{filter:hue-rotate(30deg) brightness(1.2)}100%{filter:hue-rotate(0deg) brightness(1)}}.img-card{position:relative;display:flex;align-items:center;justify-content:center}.ring-rainbow{position:absolute;inset:-18px;border-radius:36px;background:conic-gradient(#ff6eb4,#ff1493,#c71585,#ff69b4,#ffb6c1,#ffe4f0,#ff69b4,#ff1493,#c71585,#9b59b6,#ff6eb4);animation:ringRotate 3s linear infinite;z-index:-2;filter:blur(2px)}.ring-white{position:absolute;inset:-10px;border-radius:30px;background:white;z-index:-1}.ring-aura{position:absolute;inset:-30px;border-radi e:nth-child(3){animation-delay:.6s}.badge:nth-child(4){animation-delay:.9s}.badge:nth-child(5){animation-delay:1.2s}.badge:nth-child(6){animation-delay:1.5s}@keyframes badgeBounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}.corner-star{position:fixed;font-size:2.2rem;pointer-events:none;z-index:3;animation:starSpin 4s linear infinite}@keyframes starSpin{from{transform:rotate(0deg) scale(1)}50%{transform:rotate(180deg) scale(1.4)}to{transform:rotate(360deg) scale(1)}}.cs-tl{top:14px;left:14px}.cs-tr{top:14px;right:14px;animation-delay:-1s}.cs-bl{bottom:14px;left:14px;animation-delay:-2s}.cs-br{bottom:14px;right:14px;animation-delay:-3s}.info-box{background:rgba(255,255,255,.5);border:2px solid #ff69b4;border-radius:20px;padding:18px 28px;max-width:440px;text-align:center;backdrop-filter:blur(5px);box-shadow:0 4px 20px rgba(255,105,180,.3)}.info-box p{color:#c71585;font-size:1rem;line-height:1.8;margin-bottom:4px}.click-counter{font-size:1.1rem;color:#ff1493;font-weight:bold;background:rgba(255,255,255,.6);border-radius:16px;padding:8px 22px;box-shadow:0 2px 10px rgba(255,105,180,.3);animation:badgeBounce 1.5s ease-in-out infinite}#musicBtn{position:fixed;bottom:24px;right:24px;z-index:10;width:62px;height:62px;border-radius:50%;border:3px solid #fff;background:linear-gradient(135deg,#ff69b4,#ff1493);font-size:26px;cursor:pointer;box-shadow:0 4px 20px rgba(255,20,147,.5);animation:btnPulse 1.8s ease-in-out infinite;transition:transform .15s}#musicBtn:hover{transform:scale(1.12)}@keyframes btnPulse{0%,100%{box-shadow:0 4px 20px rgba(255,20,147,.5)}50%{box-shadow:0 4px 40px rgba(255,20,147,.9)}}#toast{position:fixed;bottom:100px;right:24px;z-index:10;background:rgba(255,255,255,.92);color:#ff1493;font-size:.85rem;padding:10px 16px;border-radius:20px;border:2px solid #ff69b4;box-shadow:0 4px 16px rgba(255,105,180,.4);opacity:0;transform:translateY(10px);transition:opacity .4s,transform .4s;pointer-events:none}#toast.show{opacity:1;transform:translateY(0)}#ytPlayer{display:none}</style>
