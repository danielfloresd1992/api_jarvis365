<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>✨ Richard ✨</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      overflow-x: hidden;
      font-family: 'Comic Sans MS', 'Chalkboard SE', cursive;
      background: #ffb3d9;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    /* ── Fondo degradado animado ── */
    #bg {
      position: fixed;
      inset: 0;
      background: linear-gradient(135deg, #ff9ecd, #ffc2e0, #ffd6eb, #ffaad4, #ff80bf, #e8b4ff, #ffc8f0);
      background-size: 500% 500%;
      animation: gradShift 8s ease infinite;
      z-index: 0;
    }
    @keyframes gradShift {
      0%   { background-position: 0% 50%; }
      50%  { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    /* ── Overlay de escarchas (canvas principal) ── */
    #canvas {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 1;
    }

    /* ── Contenido principal ── */
    main {
      position: relative;
      z-index: 2;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 36px;
      padding: 40px 20px 60px;
    }

    /* ── Título ── */
    h1 {
      font-size: clamp(1.4rem, 4.5vw, 3.2rem);
      text-align: center;
      color: #ff1493;
      letter-spacing: 2px;
      line-height: 1.5;
      text-shadow:
        0 0 8px #fff,
        0 0 18px #ff69b4,
        0 0 35px #ff1493,
        3px 3px 0 #ffe0f0,
        -2px -2px 0 #ffb6c1;
      animation: titleFloat 3s ease-in-out infinite, shimmer 4s linear infinite;
    }
    @keyframes titleFloat {
      0%, 100% { transform: translateY(0px) rotate(-1deg); }
      50%       { transform: translateY(-12px) rotate(1deg); }
    }
    @keyframes shimmer {
      0%   { filter: hue-rotate(0deg) brightness(1); }
      50%  { filter: hue-rotate(30deg) brightness(1.2); }
      100% { filter: hue-rotate(0deg) brightness(1); }
    }

    .title-wrapper {
      background: rgba(255,255,255,0.4);
      border: 3px solid #ff69b4;
      border-radius: 28px;
      padding: 20px 36px;
      box-shadow:
        0 0 20px rgba(255,105,180,0.4),
        inset 0 0 20px rgba(255,255,255,0.3),
        0 0 60px rgba(255,20,147,0.15);
      backdrop-filter: blur(6px);
    }

    /* ── Tarjeta de imagen ── */
    .img-card {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* Anillo exterior giratorio arcoíris */
    .ring-rainbow {
      position: absolute;
      inset: -18px;
      border-radius: 36px;
      background: conic-gradient(
        #ff6eb4, #ff1493, #c71585, #ff69b4,
        #ffb6c1, #ffe4f0, #ff69b4, #ff1493,
        #c71585, #9b59b6, #ff6eb4
      );
      animation: ringRotate 3s linear infinite;
      z-index: -2;
      filter: blur(2px);
    }
    /* Anillo interior blanco separador */
    .ring-white {
      position: absolute;
      inset: -10px;
      border-radius: 30px;
      background: white;
      z-index: -1;
    }
    /* Aura pulsante detrás */
    .ring-aura {
      position: absolute;
      inset: -30px;
      border-radius: 44px;
      background: radial-gradient(ellipse, rgba(255,105,180,0.5) 0%, transparent 70%);
      animation: auraPulse 2s ease-in-out infinite;
      z-index: -3;
    }
    @keyframes auraPulse {
      0%, 100% { transform: scale(1);   opacity: 0.7; }
      50%       { transform: scale(1.1); opacity: 1;   }
    }
    @keyframes ringRotate {
      from { transform: rotate(0deg); }
      to   { transform: rotate(360deg); }
    }

    /* Flores decorativas alrededor de la imagen */
    .flower {
      position: absolute;
      font-size: 2rem;
      pointer-events: none;
      animation: flowerOrbit linear infinite;
      transform-origin: 0 0;
    }
    @keyframes flowerOrbit {
      from { transform: rotate(var(--start)) translateX(var(--r)) rotate(calc(-1 * var(--start))); }
      to   { transform: rotate(calc(var(--start) + 360deg)) translateX(var(--r)) rotate(calc(-1 * (var(--start) + 360deg))); }
    }

    /* Escarchas sparkle fijas sobre la imagen */
    .sparkle {
      position: absolute;
      width: var(--s);
      height: var(--s);
      pointer-events: none;
      animation: sparkleBlink var(--d) ease-in-out infinite var(--delay);
    }
    .sparkle::before,
    .sparkle::after {
      content: '';
      position: absolute;
      inset: 0;
      background: white;
      border-radius: 50%;
      box-shadow: 0 0 6px 2px rgba(255,255,255,0.9), 0 0 14px 4px rgba(255,182,193,0.7);
    }
    .sparkle::after {
      background: transparent;
      border-radius: 0;
      clip-path: polygon(50% 0%, 53% 47%, 100% 50%, 53% 53%, 50% 100%, 47% 53%, 0% 50%, 47% 47%);
      background: white;
      box-shadow: 0 0 10px 2px rgba(255,255,255,1);
    }
    @keyframes sparkleBlink {
      0%, 100% { opacity: 0; transform: scale(0.4) rotate(0deg); }
      50%       { opacity: 1; transform: scale(1.2) rotate(45deg); }
    }

    img {
      display: block;
      width: min(360px, 82vw);
      border-radius: 22px;
      position: relative;
      z-index: 1;
      animation: imgGlow 2.5s ease-in-out infinite;
      filter: saturate(1.15) contrast(1.05);
    }
    @keyframes imgGlow {
      0%, 100% { box-shadow: 0 0 30px #ff69b4, 0 0 60px rgba(255,105,180,0.5); }
      50%       { box-shadow: 0 0 60px #ff1493, 0 0 120px rgba(255,20,147,0.6); }
    }

    /* ── Badges kawaii debajo de la imagen ── */
    .badges {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      justify-content: center;
    }
    .badge {
      background: rgba(255,255,255,0.55);
      border: 2px solid #ff69b4;
      border-radius: 50px;
      padding: 6px 18px;
      font-size: 0.9rem;
      color: #c71585;
      backdrop-filter: blur(4px);
      box-shadow: 0 2px 10px rgba(255,105,180,0.3);
      animation: badgeBounce 2s ease-in-out infinite;
    }
    .badge:nth-child(2) { animation-delay: .3s; }
    .badge:nth-child(3) { animation-delay: .6s; }
    .badge:nth-child(4) { animation-delay: .9s; }
    @keyframes badgeBounce {
      0%, 100% { transform: translateY(0); }
      50%       { transform: translateY(-5px); }
    }

    /* ── Estrellas esquinas ── */
    .corner-star {
      position: fixed;
      font-size: 2.2rem;
      pointer-events: none;
      z-index: 3;
      animation: starSpin 4s linear infinite;
    }
    @keyframes starSpin {
      from { transform: rotate(0deg) scale(1); }
      50%  { transform: rotate(180deg) scale(1.4); }
      to   { transform: rotate(360deg) scale(1); }
    }
    .cs-tl { top: 14px;  left: 14px; }
    .cs-tr { top: 14px;  right: 14px; animation-delay: -1s; }
    .cs-bl { bottom: 14px; left: 14px; animation-delay: -2s; }
    .cs-br { bottom: 14px; right: 14px; animation-delay: -3s; }

    /* ── Botón mute ── */
    #musicBtn {
      position: fixed;
      bottom: 24px;
      right: 24px;
      z-index: 10;
      width: 62px;
      height: 62px;
      border-radius: 50%;
      border: 3px solid #fff;
      background: linear-gradient(135deg, #ff69b4, #ff1493);
      font-size: 26px;
      cursor: pointer;
      box-shadow: 0 4px 20px rgba(255,20,147,0.5);
      animation: btnPulse 1.8s ease-in-out infinite;
      transition: transform .15s;
    }
    #musicBtn:hover { transform: scale(1.12); }
    @keyframes btnPulse {
      0%, 100% { box-shadow: 0 4px 20px rgba(255,20,147,0.5); }
      50%       { box-shadow: 0 4px 40px rgba(255,20,147,0.9); }
    }

    /* ── Toast ── */
    #toast {
      position: fixed;
      bottom: 100px;
      right: 24px;
      z-index: 10;
      background: rgba(255,255,255,0.92);
      color: #ff1493;
      font-size: 0.85rem;
      padding: 10px 16px;
      border-radius: 20px;
      border: 2px solid #ff69b4;
      box-shadow: 0 4px 16px rgba(255,105,180,0.4);
      opacity: 0;
      transform: translateY(10px);
      transition: opacity .4s, transform .4s;
      pointer-events: none;
    }
    #toast.show { opacity: 1; transform: translateY(0); }

    #ytPlayer { display: none; }
  </style>
</head>
<body>

  <div id="bg"></div>
  <canvas id="canvas"></canvas>

  <span class="corner-star cs-tl">🌸</span>
  <span class="corner-star cs-tr">🌟</span>
  <span class="corner-star cs-bl">💫</span>
  <span class="corner-star cs-br">🌸</span>

  <main>
    <div class="title-wrapper">
      <h1>🌸✨ Richard es rolo de marikon ✨🌸</h1>
    </div>

    <!-- Tarjeta imagen con flores orbitando y sparkles -->
    <div class="img-card" id="imgCard">
      <div class="ring-aura"></div>
      <div class="ring-rainbow"></div>
      <div class="ring-white"></div>

      <!-- Flores en órbita (8 flores) -->
      <span class="flower" style="--start:0deg;   --r:210px; --d:0s;    font-size:1.8rem;">🌸</span>
      <span class="flower" style="--start:45deg;  --r:215px; animation-duration:9s;  font-size:2rem;">🌺</span>
      <span class="flower" style="--start:90deg;  --r:210px; animation-duration:11s; font-size:1.6rem;">🌷</span>
      <span class="flower" style="--start:135deg; --r:218px; animation-duration:8s;  font-size:2rem;">🌸</span>
      <span class="flower" style="--start:180deg; --r:212px; animation-duration:10s; font-size:1.8rem;">🌼</span>
      <span class="flower" style="--start:225deg; --r:216px; animation-duration:12s; font-size:1.6rem;">🌺</span>
      <span class="flower" style="--start:270deg; --r:210px; animation-duration:9s;  font-size:2rem;">🌷</span>
      <span class="flower" style="--start:315deg; --r:214px; animation-duration:7s;  font-size:1.8rem;">🌸</span>

      <!-- Sparkles fijos sobre la imagen -->
      <span class="sparkle" style="--s:14px;--d:1.2s;--delay:0s;    top:8%;  left:8%;"></span>
      <span class="sparkle" style="--s:10px;--d:1.5s;--delay:.3s;   top:5%;  right:12%;"></span>
      <span class="sparkle" style="--s:16px;--d:1.0s;--delay:.6s;   top:18%; left:3%;"></span>
      <span class="sparkle" style="--s:8px; --d:1.8s;--delay:.9s;   bottom:10%; left:10%;"></span>
      <span class="sparkle" style="--s:12px;--d:1.3s;--delay:.2s;   bottom:6%;  right:8%;"></span>
      <span class="sparkle" style="--s:18px;--d:0.9s;--delay:.5s;   top:35%; right:2%;"></span>
      <span class="sparkle" style="--s:10px;--d:1.6s;--delay:1.1s;  bottom:25%; left:2%;"></span>
      <span class="sparkle" style="--s:14px;--d:1.1s;--delay:.8s;   top:55%; left:5%;"></span>
      <span class="sparkle" style="--s:9px; --d:1.4s;--delay:.4s;   top:70%; right:4%;"></span>
      <span class="sparkle" style="--s:16px;--d:1.7s;--delay:.15s;  top:12%; left:45%;"></span>

      <img src="/IMG-20230411-WA0003.jpg" alt="Richard" />
    </div>

    <!-- Badges kawaii -->
    <div class="badges">
      <span class="badge">💖 Ultra Kawaii</span>
      <span class="badge">🌸 Sailor Moon Fan</span>
      <span class="badge">✨ Nivel: Rolo</span>
      <span class="badge">🎀 Queen Energy</span>
    </div>
  </main>

  <button id="musicBtn" title="Activar música">🔇</button>
  <div id="toast">🔇 Toca para activar el sonido 🎵</div>
  <div id="ytPlayer"></div>

<script>
  /* ══════════════════════════════════════════════════════════════
     CANVAS — escarchas, flores y partículas brillantes
  ══════════════════════════════════════════════════════════════ */
  const canvas = document.getElementById('canvas');
  const ctx    = canvas.getContext('2d');

  function resize() {
    canvas.width  = window.innerWidth;
    canvas.height = window.innerHeight;
  }
  resize();
  window.addEventListener('resize', resize);

  /* ── Flores / emojis cayendo ── */
  const EMOJIS = ['🌸','💕','✨','🌷','💖','🦋','🌺','⭐','💗','🎀','🌼','🍬','🎵','🌟'];

  class Petal {
    constructor(randomY = false) { this.spawn(randomY); }
    spawn(randomY) {
      this.x     = Math.random() * canvas.width;
      this.y     = randomY ? Math.random() * canvas.height : -40;
      this.size  = Math.random() * 22 + 10;
      this.vy    = Math.random() * 1.6 + 0.5;
      this.vx    = Math.sin(Math.random() * Math.PI * 2) * 1.3;
      this.angle = Math.random() * Math.PI * 2;
      this.spin  = (Math.random() - 0.5) * 0.05;
      this.emoji = EMOJIS[Math.floor(Math.random() * EMOJIS.length)];
      this.alpha = 0.8 + Math.random() * 0.2;
    }
    update() {
      this.y += this.vy;
      this.x += this.vx + Math.sin(this.y / 55) * 0.6;
      this.angle += this.spin;
      if (this.y > canvas.height + 50) this.spawn(false);
    }
    draw() {
      ctx.save();
      ctx.globalAlpha = this.alpha;
      ctx.translate(this.x, this.y);
      ctx.rotate(this.angle);
      ctx.font = this.size + 'px serif';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(this.emoji, 0, 0);
      ctx.restore();
    }
  }

  /* ── Escarchas / glitter ── */
  class Glitter {
    constructor() { this.reset(true); }
    reset(randomY = false) {
      this.x    = Math.random() * canvas.width;
      this.y    = randomY ? Math.random() * canvas.height : -10;
      this.vy   = Math.random() * 2.5 + 1;
      this.vx   = (Math.random() - 0.5) * 1.5;
      this.r    = Math.random() * 3 + 1;
      this.hue  = Math.random() * 60 + 290;   // rosa-lila
      this.life = 1;
      this.twinkle = Math.random() * Math.PI * 2;
    }
    update() {
      this.y += this.vy;
      this.x += this.vx + Math.sin(this.y / 40) * 0.4;
      this.twinkle += 0.12;
      this.life = 0.5 + 0.5 * Math.abs(Math.sin(this.twinkle));
      if (this.y > canvas.height + 10) this.reset(false);
    }
    draw() {
      const r = this.r;
      ctx.save();
      ctx.globalAlpha = this.life * 0.9;
      ctx.translate(this.x, this.y);

      // Cruz de 4 puntas (escarcha)
      ctx.strokeStyle = `hsl(${this.hue}, 100%, 85%)`;
      ctx.shadowColor = `hsl(${this.hue}, 100%, 75%)`;
      ctx.shadowBlur  = 8;
      ctx.lineWidth   = r * 0.7;
      ctx.beginPath();
      ctx.moveTo(-r * 3, 0); ctx.lineTo(r * 3, 0);
      ctx.moveTo(0, -r * 3); ctx.lineTo(0, r * 3);
      ctx.moveTo(-r * 2, -r * 2); ctx.lineTo(r * 2, r * 2);
      ctx.moveTo(r * 2, -r * 2);  ctx.lineTo(-r * 2, r * 2);
      ctx.stroke();

      // Punto central brillante
      ctx.fillStyle = 'white';
      ctx.shadowBlur = 12;
      ctx.beginPath();
      ctx.arc(0, 0, r * 0.8, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    }
  }

  const petals   = Array.from({ length: 60 }, () => new Petal(true));
  const glitters = Array.from({ length: 120 }, () => new Glitter());

  /* ── Trail del cursor ── */
  const trail = [];
  window.addEventListener('mousemove', e => {
    for (let i = 0; i < 6; i++) {
      trail.push({
        x: e.clientX + (Math.random() - 0.5) * 12,
        y: e.clientY + (Math.random() - 0.5) * 12,
        r: Math.random() * 5 + 2,
        life: 1,
        hue: Math.random() * 60 + 290,
        type: Math.random() < 0.4 ? 'star' : 'circle'
      });
    }
  });

  function drawStar(x, y, r, hue, alpha) {
    ctx.save();
    ctx.globalAlpha = alpha;
    ctx.translate(x, y);
    ctx.fillStyle = `hsl(${hue}, 100%, 75%)`;
    ctx.shadowColor = `hsl(${hue}, 100%, 70%)`;
    ctx.shadowBlur  = 10;
    ctx.beginPath();
    for (let i = 0; i < 8; i++) {
      const angle = (i * Math.PI) / 4;
      const rad   = i % 2 === 0 ? r : r * 0.4;
      i === 0 ? ctx.moveTo(Math.cos(angle) * rad, Math.sin(angle) * rad)
              : ctx.lineTo(Math.cos(angle) * rad, Math.sin(angle) * rad);
    }
    ctx.closePath();
    ctx.fill();
    ctx.restore();
  }

  function loop() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    glitters.forEach(g => { g.update(); g.draw(); });
    petals.forEach(p   => { p.update(); p.draw(); });

    for (let i = trail.length - 1; i >= 0; i--) {
      const t = trail[i];
      t.life -= 0.05;
      if (t.life <= 0) { trail.splice(i, 1); continue; }
      if (t.type === 'star') {
        drawStar(t.x, t.y, t.r * t.life * 2, t.hue, t.life);
      } else {
        ctx.save();
        ctx.globalAlpha = t.life;
        ctx.fillStyle = `hsl(${t.hue}, 100%, 75%)`;
        ctx.shadowColor = `hsl(${t.hue}, 100%, 70%)`;
        ctx.shadowBlur  = 10;
        ctx.beginPath();
        ctx.arc(t.x, t.y, t.r * t.life, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
      }
    }

    requestAnimationFrame(loop);
  }
  loop();

  /* ══════════════════════════════════════════════════════════════
     YOUTUBE IFRAME API
  ══════════════════════════════════════════════════════════════ */
  let player = null;
  let muted  = true;
  const btn   = document.getElementById('musicBtn');
  const toast = document.getElementById('toast');

  window.onYouTubeIframeAPIReady = function () {
    player = new YT.Player('ytPlayer', {
      videoId: '9v9hdFExa3Y',
      playerVars: { autoplay: 1, loop: 1, playlist: '9v9hdFExa3Y', controls: 0, mute: 1 },
      events: {
        onReady: (e) => {
          e.target.mute();
          e.target.playVideo();
          toast.classList.add('show');
          setTimeout(() => toast.classList.remove('show'), 4500);
        }
      }
    });
  };

  const ytScript = document.createElement('script');
  ytScript.src   = 'https://www.youtube.com/iframe_api';
  document.head.appendChild(ytScript);

  btn.addEventListener('click', () => {
    if (!player || typeof player.unMute !== 'function') return;
    if (muted) {
      player.unMute();
      player.setVolume(80);
      btn.textContent = '🔊';
    } else {
      player.mute();
      btn.textContent = '🔇';
    }
    muted = !muted;
    toast.classList.remove('show');
  });
</script>
</body>
</html>
